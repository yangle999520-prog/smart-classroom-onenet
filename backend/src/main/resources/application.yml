server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/iot_classroom?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# ==================== 数据模拟器配置 ====================
# 接入真实OneNET后设为false，避免重复数据
simulator:
  enabled: false

# ==================== OneNET HTTP API 数据拉取 ====================
# 与小程序使用完全相同的接口，自动生成签名token
# 当前已用你的真实参数配置完毕，重启后端即可运行！
onenet:
  api:
    enabled: false                              # ✅ 已启用
    base-url: https://iot-api.heclouds.com
    product-id: 6x3n4Y0FuX                    # ✅ 你的产品ID
    device-name: D1                            # ✅ 你的设备名称
    access-key: mVGNFVfJaWdrvdWZPftvTauZ5b0ZU8mVyRlD5SEr5Vc=  # ✅ 你的AccessKey
    version: 2022-05-01                        # ✅ API版本


